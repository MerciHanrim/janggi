<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>장기 · Janggi</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrap">
  <div class="title-bar">
    <h1>將棋</h1>
    <div class="sub">JANGGI · 한국 장기</div>
    <button class="settings-btn" id="settingsBtn" aria-label="설정">⚙</button>
    <div class="settings-backdrop" id="settingsBackdrop"></div>
    <div class="settings-dropdown" id="settingsDropdown">
      <div class="settings-section-label" id="settingsLangLabel">언어</div>
      <button id="langKo" class="lang-btn">Korean</button>
      <button id="langEn" class="lang-btn">English</button>
      <div class="settings-divider"></div>
      <div class="settings-section-label" id="settingsBgLabel">장기판 배경</div>
      <button id="bgSansuHwa" class="lang-btn bg-btn active">산수화</button>
      <button id="bgSimple" class="lang-btn bg-btn">심플</button>
    </div>
  </div>

  <div class="game-area">
    <div class="board-col">
      <div class="board-frame" id="frame">
        <svg class="grid" id="grid" preserveAspectRatio="none"></svg>
        <div class="pieces" id="pieces"></div>
        <div class="mist-overlay" id="mistOverlay">
          <span class="mist-text" id="mistText">대국 시작</span>
        </div>
        <div class="win-overlay" id="winOverlay">
          <div class="win-faction" id="winFactionLine"></div>
          <h2 id="winTitle"></h2>
          <p id="winHint">다시 두려면 ‘처음부터’를 누르세요</p>
        </div>
        <!-- 튜토리얼: 기물 선택 오버레이 -->
        <div class="tutorial-piece-overlay" id="tutorialPieceOverlay" style="display:none">
          <div class="tutorial-piece-panel">
            <div class="tutorial-piece-title" id="tutorialPieceTitle">기물을 골라 행마법을 배워보세요</div>
            <div class="tutorial-piece-grid" id="tutorialPieceGrid"></div>
          </div>
        </div>
      </div>
      <div class="setup-overlay show" id="setupOverlay">
        <div class="setup-panel">
          <div class="setup-step" id="levelStep">
            <div class="setup-title" id="levelStepTitle">오늘은 어떻게 두실까요?</div>
            <!-- 모드 메뉴 (첫 화면) -->
            <div class="mode-grid" id="modeGrid"></div>
            <!-- 강도 선택 (컴퓨터와 두기 선택 후) -->
            <div class="level-sub-panel" id="levelSubPanel" style="display:none">
              <div class="level-play"><span class="level-play-label" id="levelPlayLabel">컴퓨터와 두기</span></div>
              <div class="level-grid" id="levelGrid"></div>
              <div class="level-note" id="levelNote">마음에 드는 상대를 고르세요 · 한 판이 끝나면 다시 고를 수 있습니다</div>
            </div>
          </div>
          <div class="setup-step" id="factionStep" style="display:none">
            <div class="setup-title">진영을 고르세요</div>
            <div class="faction-grid" id="factionGrid"></div>
            <div class="faction-note" id="factionNote">고른 진영이 화면 아래에 놓입니다 · 선수는 항상 초(楚)</div>
          </div>
          <div class="setup-step" id="setupStep" style="display:none">
            <div class="setup-title"><b id="setupSideLabel">초(楚)</b>의 상차림을 고르세요</div>
            <div class="setup-grid" id="setupGrid"></div>
            <button class="setup-skip" id="setupSkip">자동 선택(무작위)</button>
          </div>
        </div>
      </div>
    </div>

    <aside class="side-panel">
      <div class="status turn-r" id="status">
        <span class="turn-line"><span class="turn-dot"></span><b id="turnLabel">초(楚)</b> <span id="turnSuffix">차례</span></span>
        <span class="turn-persp" id="turnPersp"></span>
        <span class="msg" id="msg">기물을 골라 두세요</span>
      </div>

      <div class="captured-bar">
        <div class="side-cap r" id="capR"></div>
        <div class="side-cap b" id="capB"></div>
      </div>

      <div class="movelog-wrap">
        <div class="movelog-title" id="movelogTitle">기보</div>
        <ol class="movelog" id="movelog"></ol>
      </div>

      <div class="controls">
        <button id="undoBtn">무르기</button>
        <button id="resetBtn">처음부터</button>
        <button id="resignBtn">돌 던지기</button>
      </div>
      <div class="resign-confirm" id="resignConfirm">
        <span class="rc-text" id="resignConfirmText">정말 돌을 던지시겠습니까?</span>
        <div class="rc-buttons">
          <button id="resignYes" class="rc-yes">예</button>
          <button id="resignNo" class="rc-no">아니오</button>
        </div>
      </div>
    </aside>
  </div>
</div>

<script src="engine.js"></script>
<script src="ai-adapter.js"></script>
<script src="script.js"></script>
</body>
</html>
